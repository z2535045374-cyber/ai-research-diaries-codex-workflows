<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Page not found | AI Research Diaries</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      place-items: center;
      background: #f1f5f3;
      color: #172532;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    main {
      width: min(100%, 38rem);
      padding: clamp(2rem, 7vw, 4rem);
      border-top: 0.4rem solid #d79a2b;
      border-radius: 1rem;
      background: #fffdf8;
      box-shadow: 0 1.25rem 3.5rem rgba(7, 30, 47, 0.11);
    }
    h1 { margin-top: 0; color: #0b2940; font-size: clamp(2rem, 8vw, 3.5rem); line-height: 1.05; }
    a { color: #0b6f6d; font-weight: 750; text-underline-offset: 0.2em; }
    a:focus-visible { outline: 0.2rem solid #d79a2b; outline-offset: 0.25rem; }
  </style>
</head>
<body>
  <main>
    <p>404</p>
    <h1>Page not found</h1>
    <p>The page you requested is not available.</p>
    <p><a href="./">Return to the AI Research Diaries homepage</a></p>
  </main>
</body>
</html>
